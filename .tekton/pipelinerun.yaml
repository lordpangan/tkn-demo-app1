---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: tkn-demo-app1.git
  annotations:
    # The event we target as seen from the webhook payload
    # this can be an array too, i.e: [pull_request, push]
    pipelinesascode.tekton.dev/on-event: "[pull_request, push]"

    # The branch or tag we target (i.e., main, refs/tags/*)
    pipelinesascode.tekton.dev/on-target-branch: "[main]"

    # Shared pipeline template — PAC fetches at runtime
    pipelinesascode.tekton.dev/pipeline: "https://raw.githubusercontent.com/lordpangan/cnpe/main/tekton/pipeline-java-ci.yaml"

    # Remote Task definitions
    pipelinesascode.tekton.dev/task-1: "https://raw.githubusercontent.com/lordpangan/cnpe/main/tekton/task-maven-test.yaml"
    pipelinesascode.tekton.dev/task-2: "https://raw.githubusercontent.com/lordpangan/cnpe/main/tekton/task-semgrep.yaml"
    pipelinesascode.tekton.dev/task-3: "https://raw.githubusercontent.com/lordpangan/cnpe/main/tekton/task-kaniko.yaml"

    # Fetch the git-clone task from hub
    pipelinesascode.tekton.dev/task: "git-clone"

    # How many runs we want to keep.
    pipelinesascode.tekton.dev/max-keep-runs: "5"
spec:
  params:
    # The variable with brackets are special to Pipelines-as-Code
    # They will automatically be expanded with the events from GitHub.
    - name: repo_url
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"
    # Per-commit image tag so Chains signs each SHA individually.
    - name: image-reference
      value: "kind-registry:5000/tkn-demo-app1:{{ revision }}"
  pipelineRef:
    name: java-ci
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
    # This workspace will inject secret to help the git-clone task to be able to
    # checkout the private repositories
    - name: basic-auth
      secret:
        secretName: "{{ git_auth_secret }}"
