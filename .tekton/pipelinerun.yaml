---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: tkn-demo-app1.git
  annotations:
    # The event we target as seen from the webhook payload
    # this can be an array too, i.e: [pull_request, push]
    pipelinesascode.tekton.dev/on-event: "[pull_request, push]"

    # The branch or tag we target (i.e., main, refs/tags/*)
    pipelinesascode.tekton.dev/on-target-branch: "[main]"

    # Fetch the git-clone task from hub, we can reference later on it
    # with taskRef and it will automatically be embedded into our pipeline.
    pipelinesascode.tekton.dev/task: "git-clone"

    # How many runs we want to keep.
    pipelinesascode.tekton.dev/max-keep-runs: "5"
spec:
  params:
    # The variable with brackets are special to Pipelines-as-Code
    # They will automatically be expanded with the events from GitHub.
    - name: repo_url
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"
    # Per-commit image tag so Chains signs each SHA individually.
    - name: image-reference
      value: "kind-registry:5000/tkn-demo-app1:{{ revision }}"
  pipelineSpec:
    params:
      - name: repo_url
      - name: revision
      - name: image-reference
    workspaces:
      - name: source
      - name: basic-auth
    tasks:
      - name: fetch-repository
        taskRef:
          name: git-clone
        workspaces:
          - name: output
            workspace: source
          - name: basic-auth
            workspace: basic-auth
        params:
          - name: url
            value: $(params.repo_url)
          - name: revision
            value: $(params.revision)

      # Linting — Spotless / Google Java Format. Reuses the maven-test Task
      # with a different GOALS value. Runs first because format drift is the
      # cheapest failure to produce and the cheapest to fix locally
      # (`mvn spotless:apply`).
      - name: lint
        runAfter: [fetch-repository]
        taskRef:
          name: maven-test
        workspaces:
          - name: source
            workspace: source
        params:
          - name: GOALS
            value: ["spotless:check"]

      # Domain 1 (GitOps & CD) — run unit tests before any image work so
      # test failures fail the pipeline cheaply, independent of the build.
      - name: unit-test
        runAfter: [lint]
        taskRef:
          name: maven-test
        workspaces:
          - name: source
            workspace: source

      # Domain 5 (Security & Policy) — static analysis on the source tree.
      # Runs after tests so an obviously broken build fails first.
      - name: sast
        runAfter: [unit-test]
        taskRef:
          name: semgrep
        workspaces:
          - name: source
            workspace: source

      # Domain 1 — build multi-stage image via Kaniko and push to the
      # in-cluster registry. --insecure because kind-registry:5000 is HTTP.
      # IMAGE_URL + IMAGE_DIGEST results are picked up by Tekton Chains
      # cluster-wide config for automatic SLSA provenance + signing.
      - name: image-build
        runAfter: [sast]
        taskRef:
          name: kaniko
        workspaces:
          - name: source
            workspace: source
        params:
          - name: IMAGE
            value: $(params.image-reference)
          - name: EXTRA_ARGS
            value: ["--insecure"]
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
    # This workspace will inject secret to help the git-clone task to be able to
    # checkout the private repositories
    - name: basic-auth
      secret:
        secretName: "{{ git_auth_secret }}"
